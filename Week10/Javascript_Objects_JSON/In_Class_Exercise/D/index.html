      // whenever we use await, we have to flag that function as async
      // async function logApiResults() {}
      const logApiResults = async () => {
        // await = dear js please don't move past this line until it resolves
        const response = await fetch(
          'https://rickandmortyapi.com/api/character/1'
        )
        const result = await response.json()
        console.log(result)
        return result
      }

      logApiResults()
        .then((data) => {
          // now our returned result came in as data because we used .then() to add a callback function
          // why? so we can chain events without await or async
          // use template literals when you want to insert variables within a string
          const message = `${data.name} is a ${data.species} from ${data.origin.name} and they are ${data.status}.`
          console.log(message)
        })
        .catch((error) => {
          console.error(error)
        })
