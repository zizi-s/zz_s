      // whenever you use await you must flag the function as async
      async function getApiResults() {
        //await = dear JS please chill out and wait for the next bit of code to resolve before moving on
        const response = await fetch(
          'https://rickandmortyapi.com/api/character/10'
        )
        //console.log(response)
        const result = await response.json()
        //console.log(result)
        return result
      }

      let myApiResult = {}

      /*
      const myFunction = () => {
        //that does stuff
      }
      */

      getApiResults()
        .then((data) => {
          myApiResult = data
          // this is where we would populate some html elements on the page with the data we just retrieved
          const message = `${myApiResult.name} is a ${myApiResult.species} from ${myApiResult.origin.name} and they are ${myApiResult.status}`
          console.log(message)
        })
        .catch((error) => {
          console.log(error)
        })
