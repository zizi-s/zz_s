  <header class="site-header">
    <nav class="navbar">
      <ul class="nav-links">

        <li><a href="blindbox.html">Blind Box</a></li>

      </ul>

  <main>
    <section class="contact-hero">
      <h1>Contact</h1>
      <p>We would love to hear from you! Share your thoughts with us!</p>
    </section>

    <section class="contact-form-section">
      <form class="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email">

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="Write your message here"></textarea>

        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="contact-info">
        <p>Email: zs2939@nyu.edu</p>
        <p>Location: New York, NY</p>
        <p>Hours: Mon - Fri, 9:00 AM - 5:00 PM</p>
    </div>
    <p>© 2026 Cat World | Created by Zizi Shao</p>
  </footer>
